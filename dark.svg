<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 650" width="100%">
  <defs>
    <!-- Background Terminal Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#020617" stop-opacity="1" />
    </radialGradient>
    
    <!-- Cyberpunk Accent Gradients -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intenseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- CRT Scanline Pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.3"/>
    </pattern>

    <!-- Circular Mask for Profile Picture -->
    <clipPath id="avatarClip">
      <circle cx="230" cy="330" r="120" />
    </clipPath>
  </defs>

  <!-- ======================== BACKGROUND ======================== -->
  <rect width="1180" height="650" fill="url(#bgGlow)" />
  <rect width="1180" height="650" fill="url(#scanlines)" />

  <!-- ======================== MAIN TERMINAL WINDOW ======================== -->
  <g transform="translate(20, 20)">
    <!-- Main Window Border -->
    <rect width="1140" height="610" rx="12" fill="#060B19" stroke="#06B6D4" stroke-width="2" opacity="0.8" filter="url(#neonGlow)"/>
    <rect width="1140" height="610" rx="12" fill="none" stroke="#06B6D4" stroke-width="1" />

    <!-- Window Controls (Red, Yellow, Green) -->
    <circle cx="25" cy="25" r="6" fill="#EF4444" />
    <circle cx="45" cy="25" r="6" fill="#F59E0B" />
    <circle cx="65" cy="25" r="6" fill="#10B981" />

    <!-- Top Bar Text -->
    <text x="95" y="30" fill="#06B6D4" font-family="'Fira Code', Consolas, monospace" font-size="12" font-weight="bold" letter-spacing="1">DEV.OS</text>
    <text x="650" y="30" fill="#94A3B8" font-family="'Fira Code', Consolas, monospace" font-size="11">faseeh@devos ~ $ ./profile.sh --live</text>

    <!-- Header Divider Line -->
    <line x1="20" y1="50" x2="1120" y2="50" stroke="#1E293B" stroke-width="2" />

    <!-- ======================== INNER PANELS ======================== -->
    
    <!-- LEFT PANEL: Profile / Image Section -->
    <rect x="30" y="70" width="400" height="520" rx="12" fill="#020617" stroke="#0891B2" stroke-width="1.5" stroke-opacity="0.6" />
    
    <!-- RIGHT PANEL: Information Section -->
    <rect x="460" y="70" width="650" height="520" rx="12" fill="#020617" stroke="#0891B2" stroke-width="1.5" stroke-opacity="0.6" />


    <!-- ======================== LEFT SIDE: PROFILE IMAGE ======================== -->
    
    <image href="PASTE_YOUR_BASE64_CODE_HERE" x="110" y="210" width="240" height="240" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.5s" fill="freeze"/>
    </image>

    <!-- Glowing Border Around Image -->
    <circle cx="230" cy="330" r="122" fill="none" stroke="#06B6D4" stroke-width="2" filter="url(#neonGlow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.5s" fill="freeze"/>
    </circle>

    <!-- ======================== RIGHT SIDE: TERMINAL DATA ======================== -->
    <g transform="translate(480, 0)">
      
      <!-- SYSTEM.INFO Header -->
      <text x="0" y="105" fill="#D946EF" font-family="'Fira Code', Consolas, monospace" font-size="14" font-weight="bold">SYSTEM.INFO</text>
      <text x="0" y="125" fill="#D946EF" font-family="'Fira Code', Consolas, monospace" font-size="14" font-weight="bold">faseeh@devos</text>
      <line x1="115" y1="120" x2="610" y2="120" stroke="#D946EF" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>

      <!-- Matrix Structured Data -->
      <text x="0" y="160" font-family="'Fira Code', Consolas, monospace" font-size="13.5" xml:space="preserve">
        <tspan x="0" dy="0" fill="#06B6D4">. Subject:       </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Muhammad Faseeh Ali</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Role:          </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">AI / Full-Stack Engineer</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Origin:        </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Lahore, Pakistan</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Education:     </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Bachelors in Computer Science</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Status:        </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Building · Learning · Shipping</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. ToolChain:     </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">VS Code, Git, Docker, Upwork</tspan>
        
        <tspan x="0" dy="40" fill="#06B6D4">. Core.Lang:     </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Python, TypeScript, JavaScript</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Core.Frontend: </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">React, Next.js, Tailwind CSS</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Core.Backend:  </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Node.js, Django, Postgres</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Core.Infra:    </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">Docker, AWS, Vercel</tspan>
      </text>

      <!-- Contact Header -->
      <text x="0" y="440" fill="#10B981" font-family="'Fira Code', Consolas, monospace" font-size="14" font-weight="bold">- Contact</text>
      <line x1="85" y1="435" x2="610" y2="435" stroke="#10B981" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>

      <!-- Contact Data -->
      <text x="0" y="470" font-family="'Fira Code', Consolas, monospace" font-size="13.5" xml:space="preserve">
        <tspan x="0" dy="0" fill="#06B6D4">. Grid.Mail:     </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">fashiali412@gmail.com</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Grid.Portfolio:</tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">www.link.com</tspan>
        <tspan x="0" dy="25" fill="#06B6D4">. Grid.Github:   </tspan><tspan fill="#475569">................. </tspan><tspan fill="#F8FAFC">MuhammadFaseehAli</tspan>
      </text>

      <!-- Live Stats Header -->
      <text x="0" y="555" fill="#10B981" font-family="'Fira Code', Consolas, monospace" font-size="14" font-weight="bold">- Live Stats</text>
      <line x1="115" y1="550" x2="610" y2="550" stroke="#10B981" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
      
      <!-- Blinking Cursor & Text -->
      <rect x="0" y="566" width="8" height="15" fill="#06B6D4">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
      <text x="18" y="578" fill="#F8FAFC" font-family="'Fira Code', Consolas, monospace" font-size="13">See live GitHub stats badges below in README ↓</text>
    </g>
  </g>
</svg>
